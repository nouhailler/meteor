<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Meteor — Tableau de bord météo local" />
    <title>Meteor — Météo</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;900&family=Inter:wght@300;400;500;600&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"/>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root { margin: 0; padding: 0; height: 100%; }
      body { background: #060e20; }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        font-family: 'Material Symbols Outlined';
        display: inline-block; vertical-align: middle; line-height: 1;
      }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #38476d; border-radius: 10px; }
      /* Leaflet dark override */
      .leaflet-container { background: #060e20; font-family: 'Inter', sans-serif; }
      .leaflet-tile { filter: brightness(0.55) saturate(0.4) hue-rotate(195deg); }
      .leaflet-control-zoom a { background: rgba(16,30,62,0.95) !important; color: #5bb1ff !important; border-color: rgba(255,255,255,0.1) !important; }
      .leaflet-control-zoom a:hover { background: rgba(91,177,255,0.2) !important; }
      .leaflet-control-attribution { background: rgba(6,14,32,0.7) !important; color: #9baad6 !important; }
      .leaflet-control-attribution a { color: #5bb1ff !important; }
      .leaflet-popup-content-wrapper { background: rgba(12,25,52,0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px !important; color: #dee5ff; backdrop-filter: blur(20px); }
      .leaflet-popup-tip { background: rgba(12,25,52,0.95); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
